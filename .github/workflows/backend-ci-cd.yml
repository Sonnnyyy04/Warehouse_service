name: Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: warehouse-service-production
  cancel-in-progress: false

jobs:
  ci:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build API binary
        run: go build -o /tmp/warehouse-api ./cmd/api

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_HOST}" ]; then
            echo "VPS_HOST secret is required"
            exit 1
          fi

          if [ -z "${VPS_SSH_PRIVATE_KEY}" ]; then
            echo "VPS_SSH_PRIVATE_KEY secret is required"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy on server
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          GITHUB_REPOSITORY_URL: https://github.com/${{ github.repository }}.git
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_USER}" ]; then
            echo "VPS_USER secret is required"
            exit 1
          fi

          if [ -z "${VPS_APP_DIR}" ]; then
            echo "VPS_APP_DIR secret is required"
            exit 1
          fi

          if [ -z "${VPS_PORT}" ]; then
            VPS_PORT=22
          fi

          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "${VPS_PORT}" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" \
            "VPS_APP_DIR='${VPS_APP_DIR}' bash -s" <<'EOF'
          set -euo pipefail

          mkdir -p "${VPS_APP_DIR}"
          EOF

      - name: Upload project to server
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_PORT}" ]; then
            VPS_PORT=22
          fi

          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.gocache \
            --exclude=.idea \
            -czf - . | ssh \
            -i ~/.ssh/id_ed25519 \
            -p "${VPS_PORT}" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" \
            "TMP_DIR=\$(mktemp -d) && tar -xzf - -C \"\${TMP_DIR}\" && rm -rf \"${VPS_APP_DIR}\"/* && cp -a \"\${TMP_DIR}\"/. \"${VPS_APP_DIR}\"/ && rm -rf \"\${TMP_DIR}\""

      - name: Restart services on server
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_PORT}" ]; then
            VPS_PORT=22
          fi

          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "${VPS_PORT}" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" \
            "VPS_APP_DIR='${VPS_APP_DIR}' bash -s" <<'EOF'
          set -euo pipefail

          APP_DIR="${VPS_APP_DIR}"

          if ! command -v docker >/dev/null 2>&1; then
            echo "docker is not installed on the server"
            exit 1
          fi

          if command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          else
            COMPOSE_CMD="docker compose"
          fi

          cd "${APP_DIR}"
          ${COMPOSE_CMD} rm -sf api migrate || true
          retry_count=0
          until ${COMPOSE_CMD} up -d --build --remove-orphans; do
            retry_count=$((retry_count + 1))
            echo "docker compose up failed on attempt ${retry_count}. Current containers:"
            ${COMPOSE_CMD} ps -a || true
            echo "migrate logs:"
            ${COMPOSE_CMD} logs --no-color migrate || true
            echo "api logs:"
            ${COMPOSE_CMD} logs --no-color api || true
            if [ "${retry_count}" -ge 3 ]; then
              echo "docker compose up failed after ${retry_count} attempts"
              exit 1
            fi
            echo "docker compose up failed, retrying in 15 seconds..."
            sleep 15
          done
          docker container prune -f
          docker image prune -f
          docker builder prune -f
          ${COMPOSE_CMD} ps
          docker system df
          EOF
