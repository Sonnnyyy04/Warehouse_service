name: Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: warehouse-service-production
  cancel-in-progress: false

jobs:
  ci:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build API binary
        run: go build -o /tmp/warehouse-api ./cmd/api

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - name: Prepare SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_HOST}" ]; then
            echo "VPS_HOST secret is required"
            exit 1
          fi

          if [ -z "${VPS_SSH_PRIVATE_KEY}" ]; then
            echo "VPS_SSH_PRIVATE_KEY secret is required"
            exit 1
          fi

          if [ -z "${VPS_PORT}" ]; then
            VPS_PORT=22
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT}" "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          GITHUB_REPOSITORY_URL: https://github.com/${{ github.repository }}.git
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_USER}" ]; then
            echo "VPS_USER secret is required"
            exit 1
          fi

          if [ -z "${VPS_APP_DIR}" ]; then
            echo "VPS_APP_DIR secret is required"
            exit 1
          fi

          if [ -z "${VPS_PORT}" ]; then
            VPS_PORT=22
          fi

          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "${VPS_PORT}" \
            "${VPS_USER}@${VPS_HOST}" \
            "VPS_APP_DIR='${VPS_APP_DIR}' GITHUB_REPOSITORY_URL='${GITHUB_REPOSITORY_URL}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' bash -s" <<'EOF'
          set -euo pipefail

          APP_DIR="${VPS_APP_DIR}"
          REPO_URL="${GITHUB_REPOSITORY_URL}"
          BRANCH="${DEPLOY_BRANCH}"

          if ! command -v docker >/dev/null 2>&1; then
            echo "docker is not installed on the server"
            exit 1
          fi

          if command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          else
            COMPOSE_CMD="docker compose"
          fi

          if [ ! -d "${APP_DIR}/.git" ]; then
            mkdir -p "\$(dirname "${APP_DIR}")"
            git clone "${REPO_URL}" "${APP_DIR}"
          fi

          cd "${APP_DIR}"
          git fetch origin "${BRANCH}"
          git checkout "${BRANCH}"
          git pull --ff-only origin "${BRANCH}"
          ${COMPOSE_CMD} up -d --build
          ${COMPOSE_CMD} ps
          EOF
